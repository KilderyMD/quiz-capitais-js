<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<div id="inicio">
    <h1>QUIZ DAS CAPITAIS BY DEVMAGNO</h1>
</div>

<div id="quiz" style="display:none;">

<!-- Aqui a pergunta será escrita pelo JavaScript -->
<h2 id="pergunta"></h2>

<!-- Botões das respostas -->
<!-- Quando clicar, chama a função responder() -->
<!-- O número enviado indica qual opção foi clicada -->

<button id="op1" onclick="responder(0)"></button>
<button id="op2" onclick="responder(1)"></button>
<button id="op3" onclick="responder(2)"></button>

<!-- Aqui aparecerá "Certa resposta" ou "Errada" -->
<p id="resultado"></p>
</div>
<div id="final" style="display:none;">
    <h2> FIM DO JOGO</h2>
</div>

<!-- conecta o arquivo JS -->
<script src="quiz.js"></script>
</body>
</html>
